<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sah.Bukti Payment</title>
    <style>
        :root {
            --bg: #0e131d;
            --panel: #171f2d;
            --panel-2: #202a3b;
            --text: #f2efe8;
            --muted: #a5acb8;
            --brass: #d4a853;
            --line: #2d3749;
            --ok: #73c589;
            --warn: #f0b25c;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Georgia, "Times New Roman", serif;
            background:
                radial-gradient(circle at top, rgba(212, 168, 83, 0.16), transparent 34%),
                linear-gradient(180deg, #0a0e15, #111827 55%, #0c121b);
            color: var(--text);
            display: grid;
            place-items: center;
            padding: 24px;
        }

        .card {
            width: min(100%, 540px);
            background: linear-gradient(180deg, rgba(23, 31, 45, 0.96), rgba(19, 27, 39, 0.98));
            border: 1px solid var(--line);
            border-radius: 24px;
            padding: 28px;
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
        }

        .eyebrow {
            color: var(--brass);
            text-transform: uppercase;
            letter-spacing: 0.12em;
            font-size: 12px;
            margin: 0 0 10px;
        }

        h1 {
            margin: 0;
            font-size: 34px;
            line-height: 1.05;
        }

        .lede {
            margin: 10px 0 0;
            color: var(--muted);
            font-size: 15px;
            line-height: 1.5;
        }

        .panel {
            margin-top: 22px;
            background: var(--panel-2);
            border: 1px solid var(--line);
            border-radius: 18px;
            padding: 18px;
        }

        .row {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }

        .row:last-child {
            border-bottom: 0;
            padding-bottom: 0;
        }

        .label {
            color: var(--muted);
            font-size: 13px;
        }

        .value {
            text-align: right;
            font-weight: 700;
        }

        .amount {
            font-size: 28px;
            color: var(--brass);
        }

        .status {
            display: inline-block;
            margin-top: 14px;
            padding: 8px 12px;
            border-radius: 999px;
            background: rgba(240, 178, 92, 0.12);
            color: var(--warn);
            font-size: 13px;
            font-weight: 700;
        }

        .status.paid {
            background: rgba(115, 197, 137, 0.14);
            color: var(--ok);
        }

        .actions {
            margin-top: 22px;
            display: grid;
            gap: 12px;
        }

        button {
            appearance: none;
            border: 0;
            border-radius: 14px;
            padding: 15px 18px;
            font: inherit;
            font-weight: 700;
            cursor: pointer;
        }

        .primary {
            background: var(--brass);
            color: #20170a;
        }

        .secondary {
            background: transparent;
            color: var(--muted);
            border: 1px solid var(--line);
        }

        .note {
            margin-top: 16px;
            color: var(--muted);
            font-size: 13px;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <main class="card">
        <p class="eyebrow">Sah.Bukti Payment Link</p>
        <h1 id="title">Loading invoice</h1>
        <p class="lede" id="subtitle">Fetching invoice details.</p>

        <section class="panel" id="details" hidden>
            <div class="row">
                <span class="label">Invoice</span>
                <span class="value" id="invoice-number">-</span>
            </div>
            <div class="row">
                <span class="label">Customer</span>
                <span class="value" id="customer-name">-</span>
            </div>
            <div class="row">
                <span class="label">Amount</span>
                <span class="value amount" id="invoice-amount">RM0.00</span>
            </div>
            <div class="row">
                <span class="label">Status</span>
                <span class="value" id="invoice-status">pending</span>
            </div>
            <div class="status" id="status-chip">Awaiting payment</div>
        </section>

        <section class="actions" id="actions" hidden>
            <button class="primary" id="pay-button">Mark paid for demo</button>
            <button class="secondary" id="refresh-button">Refresh status</button>
        </section>

        <p class="note" id="note">
            Demo rail only. In production this route would hand off to an official payment provider and verified callback.
        </p>
    </main>

    <script>
        (() => {
            const params = new URLSearchParams(window.location.search);
            const invoiceId = params.get("id");
            const title = document.getElementById("title");
            const subtitle = document.getElementById("subtitle");
            const details = document.getElementById("details");
            const actions = document.getElementById("actions");
            const payButton = document.getElementById("pay-button");
            const refreshButton = document.getElementById("refresh-button");
            const statusChip = document.getElementById("status-chip");

            if (!invoiceId) {
                title.textContent = "Invalid payment link";
                subtitle.textContent = "Missing invoice id.";
                return;
            }

            async function loadInvoice() {
                const response = await fetch(`/api/v1/invoices/${invoiceId}`);
                if (!response.ok) {
                    title.textContent = "Invoice not found";
                    subtitle.textContent = "This payment link is no longer valid.";
                    return;
                }

                const invoice = await response.json();
                details.hidden = false;
                actions.hidden = false;
                title.textContent = "Ready to settle";
                subtitle.textContent = "Simple demo payment page for invoice collection.";
                document.getElementById("invoice-number").textContent = invoice.invoice_number;
                document.getElementById("customer-name").textContent = invoice.customer_name || "Customer";
                document.getElementById("invoice-amount").textContent = `RM${Number(invoice.total).toFixed(2)}`;
                document.getElementById("invoice-status").textContent = invoice.payment_status;
                syncStatus(invoice.payment_status);
            }

            function syncStatus(status) {
                if (status === "paid") {
                    statusChip.textContent = "Payment confirmed";
                    statusChip.classList.add("paid");
                    payButton.disabled = true;
                    payButton.textContent = "Already paid";
                    return;
                }
                if (status === "partial") {
                    statusChip.textContent = "Partial payment recorded";
                    statusChip.classList.remove("paid");
                    payButton.disabled = false;
                    payButton.textContent = "Complete payment";
                    return;
                }
                statusChip.textContent = "Awaiting payment";
                statusChip.classList.remove("paid");
                payButton.disabled = false;
                payButton.textContent = "Mark paid for demo";
            }

            async function confirmPayment() {
                payButton.disabled = true;
                payButton.textContent = "Recording payment...";
                const invoiceResponse = await fetch(`/api/v1/invoices/${invoiceId}`);
                if (!invoiceResponse.ok) {
                    payButton.textContent = "Invoice unavailable";
                    return;
                }
                const invoice = await invoiceResponse.json();
                const response = await fetch(`/api/v1/invoices/${invoiceId}/payment`, {
                    method: "POST",
                    headers: { "content-type": "application/json" },
                    body: JSON.stringify({
                        amount: Number(invoice.total),
                        method: "qr",
                        reference: `MOCK-${Date.now()}`,
                        confirmed: true
                    })
                });
                if (!response.ok) {
                    payButton.disabled = false;
                    payButton.textContent = "Try again";
                    return;
                }
                await loadInvoice();
            }

            payButton.addEventListener("click", confirmPayment);
            refreshButton.addEventListener("click", loadInvoice);
            loadInvoice();
        })();
    </script>
</body>
</html>
